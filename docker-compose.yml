services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskmem
      POSTGRES_PASSWORD: taskmem
      POSTGRES_DB: taskmem
    ports:
      - "65432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskmem -d taskmem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
