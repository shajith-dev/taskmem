# GoReleaser configuration — https://goreleaser.com
# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: taskmem
    main: .
    binary: taskmem
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/shajith-dev/taskmem/cmd.version={{.Version}}
      - -X github.com/shajith-dev/taskmem/cmd.commit={{.ShortCommit}}
      - -X github.com/shajith-dev/taskmem/cmd.date={{.Date}}

archives:
  - id: taskmem
    # Produces e.g. taskmem_0.1.0_linux_amd64.tar.gz — matches scripts/install.*
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: shajith-dev
    name: taskmem
